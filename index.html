<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FinTrack+ - By Saffron Events</title>
    <meta name="description" content="FinTrack+ - By Saffron Events | Track your finances with ease" />
    <meta name="author" content="FinTrack+" />

    <meta property="og:title" content="FinTrack+" />
    <meta property="og:description" content="Track your finances with ease" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/app-icon-512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@FinTrackPlus" />
    <meta name="twitter:image" content="/app-icon-512.png" />

    <!-- PWA / Home Screen -->
    <link rel="icon" type="image/png" href="/app-icon-192.png" />
    <link rel="apple-touch-icon" href="/app-icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FinTrack+" />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>
    <script>
      // Apply stored theme immediately to prevent flash of light mode
      (function() {
        var theme = localStorage.getItem('fintrack-theme') || 'system';
        var resolved = theme;
        if (theme === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        var root = document.documentElement;
        if (resolved === 'oled') {
          root.classList.add('dark', 'oled');
        } else {
          root.classList.add(resolved);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
